<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova</title>

<link rel="icon" type="image/png" href="nova-icon.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-glow"></div>

<div id="app">

    <!-- ========================= -->
    <!-- HOME -->
    <!-- ========================= -->

    <section id="home" class="home">

        <div class="home-card">

            <div class="home-avatar">

                <div class="avatar-circle"></div>

            </div>

            <h1>Nova</h1>

            <p>
                ruang kecil untuk ngobrol santai,
                tanpa terburu-buru.
            </p>

            <button class="start-btn" onclick="startChat()">
                Mulai Mengobrol
            </button>

            <div class="home-footer">

                dibuat dengan ☕ dan sedikit rasa penasaran.

            </div>

        </div>

    </section>





    <!-- ========================= -->
    <!-- CHAT -->
    <!-- ========================= -->

    <section id="chatScreen" class="chat-screen hidden">



        <!-- NAVBAR -->

        <header class="navbar">

            <div class="nav-left">

                <button
                    class="back-btn"
                    onclick="goHome()">

                    ←

                </button>

                <div class="avatar-wrapper">

                    <div
                        class="avatar"
                        id="avatar">
                    </div>

                    <span
                        class="online-dot">
                    </span>

                </div>

                <div class="user-info">

                    <div class="username">

                        Nova

                    </div>

                    <div
                        class="status"
                        id="statusText">

                        online

                    </div>

                </div>

            </div>



            <div class="nav-right">

                <button
                    id="musicBtn"
                    class="icon-btn"
                    title="Musik">

                    ♪

                </button>

            </div>

        </header>





        <!-- CHAT AREA -->

        <main
            id="chat"
            class="chat">

        </main>





        <!-- TYPING -->

        <div
            id="typing"
            class="typing hidden">

            <div class="typing-avatar">

                <div class="mini-avatar"></div>

            </div>

            <div class="typing-bubble">

                <span></span>
                <span></span>
                <span></span>

            </div>

        </div>





        <!-- CHOICES -->

        <div
            id="choices"
            class="choices">

        </div>



    </section>

</div>





<!-- ========================= -->
<!-- AUDIO -->
<!-- ========================= -->

<audio
    id="bgm"
    loop>

    <source
        src="payungteduh.mp3"
        type="audio/mpeg">

</audio>





<!-- ========================= -->
<!-- TEMPLATE CHAT BOT -->
<!-- ========================= -->

<template id="botTemplate">

    <div class="message-row bot-row">

        <div class="bubble bot">

            <div class="bubble-text">

            </div>

            <div class="bubble-time">

            </div>

        </div>

    </div>

</template>





<!-- ========================= -->
<!-- TEMPLATE CHAT USER -->
<!-- ========================= -->

<template id="userTemplate">

    <div class="message-row user-row">

        <div class="bubble user">

            <div class="bubble-text">

            </div>

            <div class="bubble-time">

            </div>

        </div>

    </div>

</template>





<script src="script.js"></script>

</body>
</html>
