<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Nova 🌸</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- HOME -->
<section id="home" class="home">
  <div class="card">
    <div class="logo">🌸</div>
    <h1>Nova</h1>
    <p>soft chat companion</p>
    <button onclick="startChat()">Start Chat</button>
  </div>
</section>

<!-- CHAT -->
<section id="chatScreen" class="chat hidden">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="profile">
      <div class="avatar">🌸</div>
      <div>
        <div class="name">Nova</div>
        <div id="status" class="status">online</div>
      </div>
    </div>

    <div class="actions">
      <button onclick="goHome()">⌂</button>
      <button id="audioBtn">▶</button>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatBox" class="chatBox"></div>

  <!-- TYPING -->
  <div id="typing" class="typing hidden">
    <span></span><span></span><span></span>
  </div>

  <!-- CHOICES -->
  <div id="choices" class="choices"></div>

</section>

<!-- AUDIO -->
<audio id="bgm" src=payungteduh.mp3""></audio>

<script src="script.js"></script>
</body>
</html>
