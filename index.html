<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova V3 Pro 🌸</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- HOME -->
<section id="home" class="home">

    <div class="card">

        <div class="logo">🌸</div>

        <h1>Nova</h1>

        <p>your soft conversation companion</p>

        <button onclick="startChat()">Start Chat</button>

    </div>

</section>

<!-- CHAT -->
<section id="chatScreen" class="chatScreen hidden">

    <!-- TOP BAR -->
    <div class="topbar">

        <div class="profile">

            <div class="avatar">🌸</div>

            <div>
                <div class="name">Nova</div>
                <div id="status" class="status">online</div>
            </div>

        </div>

        <button onclick="goHome()" class="back">←</button>

    </div>

    <!-- CHAT AREA -->
    <div id="chatBox" class="chatBox"></div>

    <!-- TYPING -->
    <div id="typing" class="typing hidden">
        <span></span><span></span><span></span>
    </div>

    <!-- CHOICES -->
    <div id="choices" class="choices"></div>

</section>

</div>

<script src="script.js"></script>
</body>
</html>
