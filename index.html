<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova V3 🌸</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<!-- HOME -->
<section id="home" class="home">
    <div class="home-card">
        <div class="logo">🌸</div>
        <h1>Nova V3</h1>
        <p>AI companion chat engine</p>
        <button onclick="startChat()">Start</button>
    </div>
</section>

<!-- CHAT -->
<section id="chatScreen" class="chat hidden">

    <header class="topbar">
        <div>
            <div class="name">Nova</div>
            <div id="status">online</div>
        </div>
        <button onclick="goHome()">←</button>
    </header>

    <main id="chatBox" class="chatBox"></main>

    <div id="typing" class="typing hidden">
        <span></span><span></span><span></span>
    </div>

    <div id="choices" class="choices"></div>

</section>

</div>

<script src="script.js"></script>
</body>
</html>
